<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200">
  <defs>
    <pattern id="sl" x="0" y="0" width="760" height="4" patternUnits="userSpaceOnUse">
      <rect width="760" height="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .m{font-family:'Share Tech Mono','Courier New',monospace}
      .gold{fill:#f5c842}.dim{fill:#4a3c0e}.mid{fill:#b8992e}.bright{fill:#ffe066}

      /* grid cells */
      .cell{fill:#111118;stroke:#1e1e2a;stroke-width:.5}
      .cell-lit{fill:#2a4a1a}
      .cell-bright{fill:#4a8a2a}
      .cell-eaten{fill:#1a1a0a}

      /* snake body segments — animated along a path */
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

      /* snake travels: right across row 1, down, left across row 2, down, right row 3 */
      /* Each segment is offset so they follow the head */
      @keyframes head{
        0%  {transform:translate(32px, 70px)}
        12% {transform:translate(696px,70px)}
        18% {transform:translate(696px,100px)}
        31% {transform:translate(32px, 100px)}
        37% {transform:translate(32px, 130px)}
        50% {transform:translate(696px,130px)}
        56% {transform:translate(696px,160px)}
        69% {transform:translate(32px, 160px)}
        75% {transform:translate(32px, 70px)}
        100%{transform:translate(696px,70px)}
      }
      @keyframes seg1{
        0%  {transform:translate(10px,  70px)}
        12% {transform:translate(674px, 70px)}
        18% {transform:translate(674px, 100px)}
        31% {transform:translate(10px,  100px)}
        37% {transform:translate(10px,  130px)}
        50% {transform:translate(674px, 130px)}
        56% {transform:translate(674px, 160px)}
        69% {transform:translate(10px,  160px)}
        75% {transform:translate(10px,  70px)}
        100%{transform:translate(674px, 70px)}
      }
      @keyframes seg2{
        0%  {transform:translate(-12px, 70px)}
        12% {transform:translate(652px, 70px)}
        18% {transform:translate(652px, 100px)}
        31% {transform:translate(-12px, 100px)}
        37% {transform:translate(-12px, 130px)}
        50% {transform:translate(652px, 130px)}
        56% {transform:translate(652px, 160px)}
        69% {transform:translate(-12px, 160px)}
        75% {transform:translate(-12px, 70px)}
        100%{transform:translate(652px, 70px)}
      }
      @keyframes seg3{
        0%  {transform:translate(-34px, 70px)}
        12% {transform:translate(630px, 70px)}
        18% {transform:translate(630px, 100px)}
        31% {transform:translate(-34px, 100px)}
        37% {transform:translate(-34px, 130px)}
        50% {transform:translate(630px, 130px)}
        56% {transform:translate(630px, 160px)}
        69% {transform:translate(-34px, 160px)}
        75% {transform:translate(-34px, 70px)}
        100%{transform:translate(630px, 70px)}
      }

      .snake-head{animation:head 8s linear infinite}
      .snake-s1{animation:seg1 8s linear infinite}
      .snake-s2{animation:seg2 8s linear infinite}
      .snake-s3{animation:seg3 8s linear infinite}

      /* contribution cells pulse in random pattern */
      .contrib{animation:contrib-pulse 4s ease-in-out infinite}
      @keyframes contrib-pulse{0%,100%{opacity:.4}50%{opacity:1}}
    </style>
  </defs>

  <rect width="760" height="200" fill="#0d0d16"/>
  <line x1="0" y1="0" x2="0" y2="200" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="760" y1="0" x2="760" y2="200" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="0" y1="0" x2="760" y2="0" stroke="#f5c842" stroke-width=".4" opacity=".2"/>
  <rect width="760" height="200" fill="url(#sl)"/>

  <text x="32" y="32" class="m dim" style="font-size:11px">// ── contributions --snake ─────────────────────────────────────────────────────</text>
  <text x="32" y="52" class="m mid" style="font-size:11px;animation:fi .05s .3s both">$ snake --eat-contributions</text>


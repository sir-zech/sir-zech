<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <pattern id="sl" x="0" y="0" width="760" height="4" patternUnits="userSpaceOnUse">
      <rect width="760" height="1" fill="rgba(0,0,0,0.10)"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .m{font-family:'Share Tech Mono','Courier New',monospace}
      .gold{fill:#f5c842}.dim{fill:#5a4a10}.mid{fill:#b8992e}.bright{fill:#ffe066}.grn{fill:#5ab83a}
      .fl{animation:flicker 7s linear infinite}
      .glow{animation:glow 2.5s ease-in-out infinite alternate}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes pop{0%{opacity:0;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}
      @keyframes flicker{0%,100%{opacity:1}92%{opacity:.82}93%{opacity:1}97%{opacity:.9}}
      @keyframes glow{from{stroke:#7a6020}to{stroke:#ffe066}}
      .cat1{animation:fi .05s .3s both}
      .cat2{animation:fi .05s 1.5s both}
      .cat3{animation:fi .05s 2.7s both}
      .cat4{animation:fi .05s 3.7s both}
      .p1a{animation:pop .15s .5s both}.p1b{animation:pop .15s .7s both}.p1c{animation:pop .15s .9s both}
      .p1d{animation:pop .15s 1.1s both}.p1e{animation:pop .15s 1.3s both}.p1f{animation:pop .15s 1.5s both}
      .p2a{animation:pop .15s 1.7s both}.p2b{animation:pop .15s 1.9s both}.p2c{animation:pop .15s 2.1s both}
      .p2d{animation:pop .15s 2.3s both}.p2e{animation:pop .15s 2.5s both}.p2f{animation:pop .15s 2.7s both}
      .p3a{animation:pop .15s 2.9s both}.p3b{animation:pop .15s 3.1s both}.p3c{animation:pop .15s 3.3s both}
      .p4a{animation:pop .15s 3.9s both}.p4b{animation:pop .15s 4.1s both}.p4c{animation:pop .15s 4.3s both}
      .p4d{animation:pop .15s 4.5s both}.p4e{animation:pop .15s 4.7s both}
      .leg{animation:fi .05s 5.2s both}
    </style>
  </defs>
  <rect width="760" height="400" rx="10" fill="#0d0d14" stroke="#f5c842" stroke-width="1.5" class="glow"/>
  <rect x="12" y="12" width="736" height="376" rx="6" fill="#0a0a0f" class="fl"/>
  <circle cx="30" cy="28" r="5" fill="#ff5f57"/>
  <circle cx="48" cy="28" r="5" fill="#febc2e"/>
  <circle cx="66" cy="28" r="5" fill="#28c840"/>
  <text x="380" y="32" text-anchor="middle" class="m mid" style="font-size:11px">naveen@dev: ~/stack</text>
  <line x1="12" y1="40" x2="748" y2="40" stroke="#f5c842" stroke-width=".5" opacity=".3"/>

  <!-- backend -->
  <text x="28" y="68" class="m dim cat1" style="font-size:12px">// backend</text>
  <g class="p1a"><rect x="28" y="76" width="96" height="26" rx="4" fill="none" stroke="#f5c842" stroke-width="1"/><text x="76" y="93" text-anchor="middle" class="m gold" style="font-size:12px">Java</text></g>
  <g class="p1b"><rect x="132" y="76" width="116" height="26" rx="4" fill="none" stroke="#f5c842" stroke-width="1"/><text x="190" y="93" text-anchor="middle" class="m gold" style="font-size:12px">Spring Boot</text></g>
  <g class="p1c"><rect x="256" y="76" width="100" height="26" rx="4" fill="none" stroke="#f5c842" stroke-width="1"/><text x="306" y="93" text-anchor="middle" class="m gold" style="font-size:12px">REST APIs</text></g>
  <g class="p1d"><rect x="364" y="76" width="56" height="26" rx="4" fill="none" stroke="#b8992e" stroke-width="1"/><text x="392" y="93" text-anchor="middle" class="m mid" style="font-size:12px">C#</text></g>
  <g class="p1e"><rect x="428" y="76" width="96" height="26" rx="4" fill="none" stroke="#b8992e" stroke-width="1"/><text x="476" y="93" text-anchor="middle" class="m mid" style="font-size:12px">ASP.NET</text></g>
  <g class="p1f"><rect x="532" y="76" width="86" height="26" rx="4" fill="none" stroke="#b8992e" stroke-width="1"/><text x="575" y="93" text-anchor="middle" class="m mid" style="font-size:12px">Node.js</text></g>

  <!-- frontend -->
  <text x="28" y="132" class="m dim cat2" style="font-size:12px">// frontend</text>
  <g class="p2a"><rect x="28" y="140" width="86" height="26" rx="4" fill="none" stroke="#f5c842" stroke-width="1"/><text x="71" y="157" text-anchor="middle" class="m gold" style="font-size:12px">Angular</text></g>
  <g class="p2b"><rect x="122" y="140" width="72" height="26" rx="4" fill="none" stroke="#f5c842" stroke-width="1"/><text x="158" y="157" text-anchor="middle" class="m gold" style="font-size:12px">React</text></g>
  <g class="p2c"><rect x="202" y="140" width="110" height="26" rx="4" fill="none" stroke="#f5c842" stroke-width="1"/><text x="257" y="157" text-anchor="middle" class="m gold" style="font-size:12px">TypeScript</text></g>
  <g class="p2d"><rect x="320" y="140" width="114" height="26" rx="4" fill="none" stroke="#b8992e" stroke-width="1"/><text x="377" y="157" text-anchor="middle" class="m mid" style="font-size:12px">JavaScript</text></g>
  <g class="p2e"><rect x="442" y="140" width="96" height="26" rx="4" fill="none" stroke="#b8992e" stroke-width="1"/><text x="490" y="157" text-anchor="middle" class="m mid" style="font-size:12px">Bootstrap</text></g>
  <g class="p2f"><rect x="546" y="140" width="80" height="26" rx="4" fill="none" stroke="#b8992e" stroke-width="1"/><text x="586" y="157" text-anchor="middle" class="m mid" style="font-size:12px">Tailwind</text></g>

  <!-- databases -->
  <text x="28" y="196" class="m dim cat3" style="font-size:12px">// databases</text>
  <g class="p3a"><rect x="28" y="204" width="112" height="26" rx="4" fill="none" stroke="#f5c842" stroke-width="1"/><text x="84" y="221" text-anchor="middle" class="m gold" style="font-size:12px">PostgreSQL</text></g>
  <g class="p3b"><rect x="148" y="204" width="96" height="26" rx="4" fill="none" stroke="#f5c842" stroke-width="1"/><text x="196" y="221" text-anchor="middle" class="m gold" style="font-size:12px">MongoDB</text></g>
  <g class="p3c"><rect x="252" y="204" width="72" height="26" rx="4" fill="none" stroke="#b8992e" stroke-width="1"/><text x="288" y="221" text-anchor="middle" class="m mid" style="font-size:12px">MySQL</text></g>

  <!-- cloud + tools -->
  <text x="28" y="260" class="m dim cat4" style="font-size:12px">// cloud + tools</text>
  <text x="170" y="260" class="m cat4" style="font-size:12px;fill:#3a6a2a">// still growing!</text>
  <g class="p4a"><rect x="28" y="268" width="72" height="26" rx="4" fill="none" stroke="#2a5a1a" stroke-width="1" stroke-dasharray="4 3"/><text x="64" y="285" text-anchor="middle" class="m grn" style="font-size:12px">Azure</text></g>
  <g class="p4b"><rect x="108" y="268" width="82" height="26" rx="4" fill="none" stroke="#2a5a1a" stroke-width="1" stroke-dasharray="4 3"/><text x="149" y="285" text-anchor="middle" class="m grn" style="font-size:12px">Postman</text></g>
  <g class="p4c"><rect x="198" y="268" width="120" height="26" rx="4" fill="none" stroke="#2a5a1a" stroke-width="1" stroke-dasharray="4 3"/><text x="258" y="285" text-anchor="middle" class="m grn" style="font-size:12px">Visual Studio</text></g>
  <g class="p4d"><rect x="326" y="268" width="72" height="26" rx="4" fill="none" stroke="#2a5a1a" stroke-width="1" stroke-dasharray="4 3"/><text x="362" y="285" text-anchor="middle" class="m grn" style="font-size:12px">Eclipse</text></g>
  <g class="p4e"><rect x="406" y="268" width="72" height="26" rx="4" fill="none" stroke="#2a5a1a" stroke-width="1" stroke-dasharray="4 3"/><text x="442" y="285" text-anchor="middle" class="m grn" style="font-size:12px">VS Code</text></g>

  <!-- legend -->
  <g class="leg">
    <rect x="28" y="322" width="12" height="12" rx="2" fill="none" stroke="#f5c842" stroke-width="1"/>
    <text x="46" y="333" class="m mid" style="font-size:11px">confident</text>
    <rect x="130" y="322" width="12" height="12" rx="2" fill="none" stroke="#b8992e" stroke-width="1"/>
    <text x="148" y="333" class="m mid" style="font-size:11px">working knowledge</text>
    <rect x="300" y="322" width="12" height="12" rx="2" fill="none" stroke="#2a5a1a" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="318" y="333" class="m grn" style="font-size:11px">learning / growing</text>
    <text x="28" y="372" class="m dim" style="font-size:11px">$ status --skills  <tspan fill="#ffe066">all systems operational</tspan></text>
  </g>

  <rect x="12" y="12" width="736" height="376" rx="6" fill="url(#sl)"/>
</svg>

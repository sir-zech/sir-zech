<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 270" width="760" height="270">
  <defs>
    <pattern id="sl" x="0" y="0" width="760" height="4" patternUnits="userSpaceOnUse">
      <rect width="760" height="1" fill="rgba(0,0,0,0.10)"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .m{font-family:'Share Tech Mono','Courier New',monospace}
      .gold{fill:#f5c842}.dim{fill:#5a4a10}.mid{fill:#b8992e}.bright{fill:#ffe066}
      .fl{animation:flicker 7s linear infinite}
      .glow{animation:glow 2.5s ease-in-out infinite alternate}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      @keyframes flicker{0%,100%{opacity:1}92%{opacity:.82}93%{opacity:1}97%{opacity:.9}}
      @keyframes glow{from{stroke:#7a6020}to{stroke:#ffe066}}
      .l1{animation:fi .05s .3s both}
      .l2{animation:fi .05s 1.0s both}
      .l3{animation:fi .05s 1.8s both}
      .l4{animation:fi .05s 2.6s both}
      .blink{animation:blink 1.2s step-end infinite}
    </style>
  </defs>
  <rect width="760" height="270" rx="10" fill="#0d0d14" stroke="#f5c842" stroke-width="1.5" class="glow"/>
  <rect x="12" y="12" width="736" height="246" rx="6" fill="#0a0a0f" class="fl"/>
  <circle cx="30" cy="28" r="5" fill="#ff5f57"/>
  <circle cx="48" cy="28" r="5" fill="#febc2e"/>
  <circle cx="66" cy="28" r="5" fill="#28c840"/>
  <text x="380" y="32" text-anchor="middle" class="m mid" style="font-size:11px">naveen@dev: ~/games</text>
  <line x1="12" y1="40" x2="748" y2="40" stroke="#f5c842" stroke-width=".5" opacity=".3"/>

  <text x="28" y="70" class="m l1"><tspan class="dim">$ </tspan><tspan class="bright">ls -la ./games/</tspan></text>

  <g class="l2">
    <rect x="28" y="82" width="700" height="44" rx="4" fill="rgba(245,200,66,0.04)" stroke="#f5c842" stroke-width=".8"/>
    <text x="44" y="101" class="m bright" style="font-size:13px">FLAMES</text>
    <text x="44" y="117" class="m dim" style="font-size:11px">classic compatibility game — find your relationship destiny</text>
    <text x="720" y="101" text-anchor="end" class="m gold" style="font-size:11px">flames-sirzech.netlify.app</text>
    <text x="720" y="117" text-anchor="end" class="m dim" style="font-size:10px">[LIVE]</text>
  </g>

  <g class="l3">
    <rect x="28" y="134" width="700" height="44" rx="4" fill="rgba(245,200,66,0.04)" stroke="#f5c842" stroke-width=".8"/>
    <text x="44" y="153" class="m bright" style="font-size:13px">OMERTA</text>
    <text x="44" y="169" class="m dim" style="font-size:11px">mafia-style game of deception, bluffing and deduction</text>
    <text x="720" y="153" text-anchor="end" class="m gold" style="font-size:11px">mafia-sirzech.netlify.app</text>
    <text x="720" y="169" text-anchor="end" class="m dim" style="font-size:10px">[LIVE]</text>
  </g>

  <g class="l4">
    <rect x="28" y="186" width="700" height="44" rx="4" fill="none" stroke="#3a3010" stroke-width=".8" stroke-dasharray="6 3"/>
    <text x="44" y="205" class="m dim" style="font-size:13px">???  next game loading...</text>
    <text x="44" y="221" class="m dim" style="font-size:11px">development in progress</text>
    <text x="720" y="212" text-anchor="end" class="m dim blink" style="font-size:11px">[ STAY TUNED ]</text>
  </g>

  <rect x="12" y="12" width="736" height="246" rx="6" fill="url(#sl)"/>
</svg>

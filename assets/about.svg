<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 310" width="760" height="310">
  <defs>
    <pattern id="sl" x="0" y="0" width="760" height="4" patternUnits="userSpaceOnUse">
      <rect width="760" height="1" y="0" fill="rgba(0,0,0,0.10)"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .m{font-family:'Share Tech Mono','Courier New',monospace}
      .dim{fill:#5a4a10}.gold{fill:#f5c842}.bright{fill:#ffe066}.mid{fill:#b8992e}
      .l1{animation:fi .05s .2s both}.l2{animation:fi .05s .9s both}
      .l3{animation:fi .05s 1.6s both}.l4{animation:fi .05s 2.3s both}
      .l5{animation:fi .05s 3.0s both}.l6{animation:fi .05s 3.7s both}
      .l7{animation:fi .05s 4.4s both}.l8{animation:fi .05s 5.1s both}
      .cur{animation:fi .05s 5.4s both,blink 1s 5.4s step-end infinite}
      .fl{animation:flicker 7s linear infinite}
      .glow{animation:glow 2.5s ease-in-out infinite alternate}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      @keyframes flicker{0%,100%{opacity:1}92%{opacity:.82}93%{opacity:1}97%{opacity:.9}98%{opacity:1}}
      @keyframes glow{from{stroke:#7a6020}to{stroke:#ffe066}}
    </style>
  </defs>
  <rect width="760" height="310" rx="10" fill="#0d0d14" stroke="#f5c842" stroke-width="1.5" class="glow"/>
  <rect x="12" y="12" width="736" height="286" rx="6" fill="#0a0a0f" class="fl"/>
  <circle cx="30" cy="28" r="5" fill="#ff5f57"/>
  <circle cx="48" cy="28" r="5" fill="#febc2e"/>

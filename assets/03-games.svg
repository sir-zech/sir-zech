<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" width="760" height="290">

  <defs>
    <pattern id="sl" x="0" y="0" width="760" height="4" patternUnits="userSpaceOnUse">
      <rect width="760" height="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="760" height="290" fill="#0d0d16"/>
  <line x1="0" y1="0" x2="0" y2="290" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="760" y1="0" x2="760" y2="290" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="0" y1="0" x2="760" y2="0" stroke="#f5c842" stroke-width=".4" opacity=".2"/>
  <rect width="760" height="290" fill="url(#sl)"/>

  <!-- Header -->
  <text x="32" y="32" fill="#4a3c0e" font-size="11" font-family="monospace">
    // ── games --hobby.exe ─────────────────────────────────────────────────────────
  </text>

  <text x="32" y="58" font-family="monospace">
    <tspan fill="#4a3c0e">$ </tspan>
    <tspan fill="#ffe066">ls -la ./games/</tspan>
  </text>

  <!-- GAME 1 -->
  <g>
    <rect x="32" y="70" width="696" height="50" rx="4"
          fill="rgba(245,200,66,0.04)" stroke="#f5c842" stroke-width=".8"/>

    <text x="48" y="90" fill="#ffe066" font-size="13" font-family="monospace">
      FLAMES
    </text>

    <text x="48" y="107" fill="#4a3c0e" font-size="11" font-family="monospace">
      classic compatibility game — find your relationship destiny
    </text>

    <!-- PLAY BUTTON (EDIT URL HERE) -->
    <a href="YOUR_GAME_1_URL_HERE">
      <rect x="604" y="78" width="110" height="26" rx="3"
            fill="rgba(245,200,66,0.1)" stroke="#f5c842" stroke-width="1"/>
      <text x="659" y="95" text-anchor="middle"
            fill="#f5c842" font-size="11" font-family="monospace">
        ▶ PLAY
      </text>
    </a>
  </g>

  <!-- GAME 2 -->
  <g>
    <rect x="32" y="130" width="696" height="50" rx="4"
          fill="rgba(245,200,66,0.04)" stroke="#f5c842" stroke-width=".8"/>

    <text x="48" y="150" fill="#ffe066" font-size="13" font-family="monospace">
      OMERTA
    </text>

    <text x="48" y="167" fill="#4a3c0e" font-size="11" font-family="monospace">
      mafia-style game of deception, bluffing and deduction
    </text>

    <!-- PLAY BUTTON (EDIT URL HERE) -->
    <a href="YOUR_GAME_2_URL_HERE">
      <rect x="604" y="138" width="110" height="26" rx="3"
            fill="rgba(245,200,66,0.1)" stroke="#f5c842" stroke-width="1"/>
      <text x="659" y="155" text-anchor="middle"
            fill="#f5c842" font-size="11" font-family="monospace">
        ▶ PLAY
      </text>
    </a>
  </g>

  <!-- PLACEHOLDER -->
  <g>
    <rect x="32" y="190" width="696" height="50" rx="4"
          fill="none" stroke="#3a3010" stroke-width=".8" stroke-dasharray="6 3"/>

    <text x="48" y="210" fill="#4a3c0e" font-size="13" font-family="monospace">
      ??? next game loading...
    </text>

    <text x="48" y="226" fill="#4a3c0e" font-size="11" font-family="monospace">
      something is being built in the dark
    </text>

    <text x="659" y="218" text-anchor="middle"
          fill="#4a3c0e" font-size="11" font-family="monospace">
      [ SOON ]
    </text>
  </g>

  <rect x="0" y="270" width="760" height="20" fill="#0d0d16"/>

</svg>

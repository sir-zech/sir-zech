<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 310" width="760" height="310">
  <defs>
    <pattern id="sl" x="0" y="0" width="760" height="4" patternUnits="userSpaceOnUse">
      <rect width="760" height="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .m{font-family:'Share Tech Mono','Courier New',monospace}
      .gold{fill:#f5c842}.dim{fill:#4a3c0e}.mid{fill:#b8992e}.bright{fill:#ffe066}.grn{fill:#5ab83a}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      @keyframes hov{0%,100%{fill:rgba(245,200,66,0.04)}50%{fill:rgba(245,200,66,0.09)}}
      .l1{animation:fi .05s .3s both}.l2{animation:fi .05s 1.0s both}
      .l3{animation:fi .05s 1.8s both}.l4{animation:fi .05s 2.6s both}
      .l5{animation:fi .05s 3.2s both}
      .blink{animation:blink 1.3s step-end infinite}
      .row-pulse{animation:hov 3s ease-in-out infinite}
    </style>
  </defs>

  <rect width="760" height="310" fill="#0d0d16"/>
  <line x1="0" y1="0" x2="0" y2="310" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="760" y1="0" x2="760" y2="310" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="0" y1="0" x2="760" y2="0" stroke="#f5c842" stroke-width=".4" opacity=".2"/>
  <rect width="760" height="310" fill="url(#sl)"/>

  <!-- header -->
  <text x="32" y="30" class="m dim l1" style="font-size:11px">// ── games --hobby.exe ─────────────────────────────────────────────────────────</text>
  <text x="32" y="54" class="m l1"><tspan class="dim">$ </tspan><tspan class="bright">ls -la ./games/</tspan></text>

  <!-- column headers -->
  <g class="l2">
    <text x="48" y="76" class="m dim" style="font-size:10px">NAME</text>
    <text x="210" y="76" class="m dim" style="font-size:10px">TYPE</text>
    <text x="390" y="76" class="m dim" style="font-size:10px">DESCRIPTION</text>
    <line x1="32" y1="80" x2="728" y2="80" stroke="#f5c842" stroke-width=".4" opacity=".3"/>
  </g>

  <!-- game 1 — FLAMES -->
  <g class="l2">
    <rect x="32" y="86" width="696" height="44" rx="3" fill="rgba(245,200,66,0.04)" stroke="#f5c842" stroke-width=".6" class="row-pulse"/>
    <!-- status dot -->
    <circle cx="42" cy="108" r="4" fill="#5ab83a"/>
    <text x="54" y="112" class="m bright" style="font-size:13px;font-weight:bold">FLAMES</text>
    <text x="210" y="104" class="m mid" style="font-size:10px">[ compatibility ]</text>
    <text x="390" y="104" class="m dim" style="font-size:11px">classic relationship destiny game</text>
    <text x="210" y="120" class="m dim" style="font-size:10px">flames-sirzech.netlify.app</text>
    <!-- tag -->
    <rect x="668" y="94" width="50" height="18" rx="9" fill="rgba(90,184,58,0.15)" stroke="#5ab83a" stroke-width=".7"/>
    <text x="693" y="107" text-anchor="middle" class="m grn" style="font-size:9px">LIVE</text>
  </g>

  <!-- game 2 — OMERTA -->
  <g class="l3">
    <rect x="32" y="138" width="696" height="44" rx="3" fill="rgba(245,200,66,0.04)" stroke="#f5c842" stroke-width=".6"/>
    <circle cx="42" cy="160" r="4" fill="#5ab83a"/>
    <text x="54" y="164" class="m bright" style="font-size:13px;font-weight:bold">OMERTA</text>
    <text x="210" y="156" class="m mid" style="font-size:10px">[ social deduction ]</text>
    <text x="390" y="156" class="m dim" style="font-size:11px">mafia-style bluffing &amp; deception</text>
    <text x="210" y="172" class="m dim" style="font-size:10px">mafia-sirzech.netlify.app</text>
    <rect x="668" y="146" width="50" height="18" rx="9" fill="rgba(90,184,58,0.15)" stroke="#5ab83a" stroke-width=".7"/>
    <text x="693" y="159" text-anchor="middle" class="m grn" style="font-size:9px">LIVE</text>
  </g>

  <!-- placeholder slot 3 -->
  <g class="l4">
    <rect x="32" y="190" width="696" height="44" rx="3" fill="none" stroke="#3a3010" stroke-width=".6" stroke-dasharray="5 3"/>
    <circle cx="42" cy="212" r="4" fill="none" stroke="#4a3c0e" stroke-width="1.2"/>
    <text x="54" y="216" class="m dim" style="font-size:13px">???  NEXT_GAME</text>
    <text x="210" y="208" class="m dim" style="font-size:10px">[ ??????????? ]</text>
    <text x="390" y="208" class="m dim" style="font-size:11px">something is being built in the dark</text>
    <text x="693" y="215" text-anchor="middle" class="m dim blink" style="font-size:9px">SOON</text>
  </g>

  <!-- placeholder slot 4 — future expansion -->
  <g class="l5">
    <rect x="32" y="242" width="696" height="30" rx="3" fill="none" stroke="#2a2008" stroke-width=".5" stroke-dasharray="3 4"/>
    <text x="48" y="261" class="m dim" style="font-size:10px;opacity:.4">// add_game() — slot reserved</text>
  </g>

  <!-- bottom blend -->
  <rect x="0" y="290" width="760" height="20" fill="#0d0d16"/>
</svg>

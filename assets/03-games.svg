<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" width="760" height="290">
  <defs>
    <pattern id="sl" x="0" y="0" width="760" height="4" patternUnits="userSpaceOnUse">
      <rect width="760" height="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .m{font-family:'Share Tech Mono','Courier New',monospace}
      .gold{fill:#f5c842}.dim{fill:#4a3c0e}.mid{fill:#b8992e}.bright{fill:#ffe066}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      @keyframes hov{0%,100%{fill:rgba(245,200,66,0.06)}50%{fill:rgba(245,200,66,0.12)}}
      .l1{animation:fi .05s .3s both}.l2{animation:fi .05s 1.0s both}
      .l3{animation:fi .05s 1.8s both}.l4{animation:fi .05s 2.6s both}
      .blink{animation:blink 1.3s step-end infinite}
      .row-bg{animation:hov 3s ease-in-out infinite}
      .btn:hover rect{fill:rgba(245,200,66,0.25)!important}
    </style>
  </defs>

  <rect width="760" height="290" fill="#0d0d16"/>
  <line x1="0" y1="0" x2="0" y2="290" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="760" y1="0" x2="760" y2="290" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="0" y1="0" x2="760" y2="0" stroke="#f5c842" stroke-width=".4" opacity=".2"/>
  <rect width="760" height="290" fill="url(#sl)"/>

  <text x="32" y="32" class="m dim l1" style="font-size:11px">// ── games --hobby.exe ─────────────────────────────────────────────────────────</text>
  <text x="32" y="58" class="m l1"><tspan class="dim">$ </tspan><tspan class="bright">ls -la ./games/</tspan></text>

  <!-- game 1 row + embedded link button -->
  <g class="l2">
    <rect x="32" y="70" width="696" height="50" rx="4" fill="rgba(245,200,66,0.04)" stroke="#f5c842" stroke-width=".8" class="row-bg"/>
    <text x="48" y="90" class="m bright" style="font-size:13px">FLAMES</text>
    <text x="48" y="107" class="m dim" style="font-size:11px">classic compatibility game — find your relationship destiny</text>
    <!-- clickable button -->
    <a href="https://flames-sirzech.netlify.app/" target="_blank">
      <rect x="604" y="78" width="110" height="26" rx="3" fill="rgba(245,200,66,0.1)" stroke="#f5c842" stroke-width="1"/>
      <text x="659" y="95" text-anchor="middle" class="m gold" style="font-size:11px">▶  PLAY</text>
    </a>
  </g>

  <!-- game 2 row + embedded link button -->
  <g class="l3">
    <rect x="32" y="130" width="696" height="50" rx="4" fill="rgba(245,200,66,0.04)" stroke="#f5c842" stroke-width=".8"/>
    <text x="48" y="150" class="m bright" style="font-size:13px">OMERTA</text>
    <text x="48" y="167" class="m dim" style="font-size:11px">mafia-style game of deception, bluffing and deduction</text>
    <a href="https://mafia-sirzech.netlify.app/" target="_blank">
      <rect x="604" y="138" width="110" height="26" rx="3" fill="rgba(245,200,66,0.1)" stroke="#f5c842" stroke-width="1"/>
      <text x="659" y="155" text-anchor="middle" class="m gold" style="font-size:11px">▶  PLAY</text>
    </a>
  </g>

  <!-- placeholder row -->
  <g class="l4">
    <rect x="32" y="190" width="696" height="50" rx="4" fill="none" stroke="#3a3010" stroke-width=".8" stroke-dasharray="6 3"/>
    <text x="48" y="210" class="m dim" style="font-size:13px">???  next game loading...</text>
    <text x="48" y="226" class="m dim" style="font-size:11px">something is being built in the dark</text>
    <text x="659" y="218" text-anchor="middle" class="m dim blink" style="font-size:11px">[ SOON ]</text>
  </g>

  <rect x="0" y="270" width="760" height="20" fill="#0d0d16"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 80" width="760" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .m{font-family:'Share Tech Mono','Courier New',monospace}
      .gold{fill:#f5c842}.dim{fill:#5a4a10}.mid{fill:#b8992e}.bright{fill:#ffe066}
      .glow{animation:glow 2.5s ease-in-out infinite alternate}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes glow{from{stroke:#7a6020}to{stroke:#ffe066}}
      @keyframes march{from{stroke-dashoffset:0}to{stroke-dashoffset:-16}}
      .march{stroke-dasharray:8 4;animation:march .7s linear infinite}
      .l1{animation:fi .05s .2s both}.l2{animation:fi .05s .8s both}
    </style>
  </defs>
  <rect width="760" height="80" rx="8" fill="#0d0d14" stroke="#f5c842" stroke-width="1.5" class="glow"/>
  <line x1="28" y1="40" x2="732" y2="40" stroke="#f5c842" stroke-width=".8" class="march" opacity=".5"/>
  <rect x="280" y="24" width="200" height="32" rx="4" fill="#0a0a0f" stroke="#f5c842" stroke-width="1"/>
  <text x="380" y="44" text-anchor="middle" class="m bright l1" style="font-size:13px">$ github --stats</text>
</svg>

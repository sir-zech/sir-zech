<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" width="760" height="240">
  <defs>
    <pattern id="sl" x="0" y="0" width="760" height="4" patternUnits="userSpaceOnUse">
      <rect width="760" height="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .m{font-family:'Share Tech Mono','Courier New',monospace}
      .gold{fill:#f5c842}.dim{fill:#4a3c0e}.mid{fill:#b8992e}.bright{fill:#ffe066}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes pop{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
      @keyframes glow{from{stroke:#7a6020}to{stroke:#ffe066}}
      @keyframes march{from{stroke-dashoffset:0}to{stroke-dashoffset:-16}}
      .l1{animation:fi .05s .3s both}
      .c1{animation:pop .2s .8s both}
      .c2{animation:pop .2s 1.3s both}
      .c3{animation:pop .2s 1.8s both}
      .q1{animation:fi .05s 2.4s both}
      .q2{animation:fi .05s 3.0s both}
      .glowbtn{animation:glow 2s ease-in-out infinite alternate}
    </style>
  </defs>

  <rect width="760" height="240" rx="12" fill="#0d0d16"/>
  <!-- open top -->
  <rect x="0" y="0" width="760" height="12" fill="#0d0d16"/>
  <!-- sides + bottom border -->
  <line x1="0" y1="0" x2="0" y2="228" stroke="#f5c842" stroke-width="1.5"/>
  <line x1="760" y1="0" x2="760" y2="228" stroke="#f5c842" stroke-width="1.5"/>
  <rect x="0" y="0" width="760" height="240" rx="12" fill="none" stroke="#f5c842" stroke-width="1.5"/>
  <!-- open top seam -->
  <rect x="1" y="0" width="758" height="14" fill="#0d0d16"/>
  <line x1="0" y1="0" x2="760" y2="0" stroke="#f5c842" stroke-width=".4" opacity=".2"/>

  <rect width="760" height="240" rx="12" fill="url(#sl)"/>

  <text x="32" y="28" class="m dim l1" style="font-size:11px">// ── connect ───────────────────────────────────────────────────────────────────</text>
  <text x="32" y="52" class="m l1"><tspan class="dim">$ </tspan><tspan class="bright">ping --me</tspan></text>

  <!-- GitHub button -->
  <a href="https://github.com/sir-zech" target="_blank">
    <g class="c1">
      <rect x="32" y="66" width="210" height="48" rx="4" fill="rgba(245,200,66,0.06)" stroke="#f5c842" stroke-width="1" class="glowbtn"/>
      <text x="137" y="86" text-anchor="middle" class="m bright" style="font-size:13px">GitHub</text>
      <text x="137" y="103" text-anchor="middle" class="m dim" style="font-size:10px">github.com/sir-zech</text>
    </g>
  </a>

  <!-- LinkedIn button -->
  <a href="https://www.linkedin.com/in/sirzech/" target="_blank">
    <g class="c2">
      <rect x="276" y="66" width="210" height="48" rx="4" fill="rgba(245,200,66,0.06)" stroke="#f5c842" stroke-width="1" class="glowbtn"/>
      <text x="381" y="86" text-anchor="middle" class="m bright" style="font-size:13px">LinkedIn</text>
      <text x="381" y="103" text-anchor="middle" class="m dim" style="font-size:10px">linkedin.com/in/sirzech</text>
    </g>
  </a>

  <!-- Portfolio button -->
  <a href="https://sirzech.netlify.app/#PORTFOLIO" target="_blank">
    <g class="c3">
      <rect x="520" y="66" width="210" height="48" rx="4" fill="rgba(245,200,66,0.06)" stroke="#f5c842" stroke-width="1" class="glowbtn"/>
      <text x="625" y="86" text-anchor="middle" class="m bright" style="font-size:13px">Portfolio</text>
      <text x="625" y="103" text-anchor="middle" class="m dim" style="font-size:10px">sirzech.netlify.app</text>
    </g>
  </a>

  <!-- quote -->
  <text x="32" y="148" class="m mid q1" style="font-size:11px">"Any fool can write code a computer understands.</text>
  <text x="32" y="166" class="m mid q2" style="font-size:11px"> Good programmers write code humans understand."</text>
  <text x="32" y="184" class="m dim q2" style="font-size:10px">                                         — Martin Fowler</text>

  <!-- bottom visitor badge area -->
  <text x="32" y="218" class="m dim" style="font-size:10px;animation:fi .05s 3.5s both">$ exit  //  made with ♥ and too much coffee</text>
</svg>
